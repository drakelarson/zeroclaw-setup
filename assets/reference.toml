# ========================================
# VISION/IMAGE TOOLS CONFIGURATION
# ========================================

# ========================================
# VISION/IMAGE HANDLING (LOCAL)
# ========================================
# Ava uses LOCAL vision tool - no API needed!
# 
# When image is received:
# 1. ZeroClaw downloads to: /root/.zeroclaw/workspace/telegram_files/
# 2. Ava runs: vision describe "/path/to/image.jpg"
# 3. BLIP/Moondream describes image locally (~500MB RAM)
#
# NO model_routes needed for vision
# The vision CLI handles everything locally

# Vision provider for image understanding
# Uses NVIDIA's Llama Vision model
[[model_routes]]
hint = "vision"
provider = "nvidia"
model = "meta/llama-3.2-11b-vision-instruct"


# Vision Provider - Use Gemini for image analysis
# Gemini natively supports vision, so images go directly to Gemini
# The description comes back to Ava as text
